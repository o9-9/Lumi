name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Publish (Single-file, trimmed, win-x64)
        run: >
          dotnet publish src/Lumi/Lumi.csproj
          -c Release
          -r win-x64
          -o publish
          /p:Version=${{ inputs.version }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Lumi.exe
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: https://wus2.codesigning.azure.net/
          trusted-signing-account-name: acsfluentsearch
          certificate-profile-name: profileFluentSearch1
          files-folder: ${{ github.workspace }}\publish
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous release (for delta generation)
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack Velopack release
        run: >
          vpk pack
          -u Lumi
          -v ${{ inputs.version }}
          -p publish
          --mainExe Lumi.exe
          --icon src/Lumi/Assets/lumi-icon.ico

      - name: Sign Setup.exe
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: https://wus2.codesigning.azure.net/
          trusted-signing-account-name: acsfluentsearch
          certificate-profile-name: profileFluentSearch1
          files-folder: ${{ github.workspace }}\Releases
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --releaseName "Lumi v${{ inputs.version }}"
          --tag v${{ inputs.version }}
